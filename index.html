<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f7cff" />
  <title>영어 단어장</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>영어 단어장</h1>
  </header>

  <div id="banner" class="banner" hidden></div>

  <main class="app-main">
    <!-- 홈: 오늘의 학습 -->
    <section id="screen-home" class="screen">
      <h2>오늘의 학습</h2>
      <div id="home-root"></div>
    </section>

    <!-- 통계 -->
    <section id="screen-stats" class="screen" hidden>
      <h2>학습 통계</h2>
      <div class="stat-grid">
        <div class="stat-box"><span class="stat-num" id="stat-reviewed">0</span><span class="stat-label">오늘 학습</span></div>
        <div class="stat-box"><span class="stat-num" id="stat-streak">0</span><span class="stat-label">연속 학습일</span></div>
        <div class="stat-box"><span class="stat-num" id="stat-known">0</span><span class="stat-label">이번 회차</span></div>
        <div class="stat-box"><span class="stat-num" id="stat-total">0</span><span class="stat-label">단어장 단어</span></div>
      </div>
    </section>

    <!-- 설정 -->
    <section id="screen-settings" class="screen" hidden>
      <h2>설정</h2>
      <label class="field">
        <span>하루 학습 단어 수</span>
        <input type="number" id="set-wordsPerDay" min="0" max="999" />
      </label>
      <label class="field">
        <span>알림 시각</span>
        <input type="time" id="set-notifyTime" />
      </label>
      <button type="button" id="btn-save-settings" class="btn primary">저장</button>
      <p class="muted small">설정한 시각에 오늘 학습을 안 했으면 학습 알림, 했으면 복습 알림을 보냅니다. 알림은 기기 지원 시에만 예약되며(iOS 미지원), 문구는 앱을 마지막으로 연 시점의 학습 여부 기준입니다. 미지원 시 앱을 열 때 배지/배너로 알려줍니다.</p>

      <h3>단어장(CSV) 관리</h3>
      <div class="toolbar">
        <input type="text" id="new-deck-name" placeholder="새 단어장 이름" />
        <button type="button" id="btn-new-deck" class="btn">단어장 추가</button>
      </div>
      <label class="field">
        <span>가져올 단어장</span>
        <select id="import-deck"></select>
      </label>
      <div class="toolbar">
        <button type="button" id="btn-import" class="btn primary">CSV 가져오기</button>
        <input type="file" id="csv-file" accept=".csv,text/csv" hidden />
      </div>
      <div id="deck-list" class="deck-list"></div>
    </section>
  </main>

  <nav class="app-nav">
    <button type="button" data-nav="home" class="nav-btn active">홈</button>
    <button type="button" data-nav="stats" class="nav-btn">통계</button>
    <button type="button" data-nav="settings" class="nav-btn">설정</button>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
