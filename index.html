<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f7cff" />
  <title>영어 단어장</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>영어 단어장</h1>
  </header>

  <div id="banner" class="banner" hidden></div>

  <main class="app-main">
    <!-- 오늘의 복습 -->
    <section id="screen-review" class="screen">
      <h2>오늘의 복습</h2>
      <div id="review-root" class="review-root"></div>
    </section>

    <!-- 카드 목록/관리 -->
    <section id="screen-cards" class="screen" hidden>
      <h2>카드 관리</h2>
      <div class="toolbar">
        <button type="button" id="btn-import" class="btn primary">CSV 가져오기</button>
        <button type="button" id="btn-export" class="btn">CSV 내보내기</button>
        <input type="file" id="csv-file" accept=".csv,text/csv" hidden />
      </div>
      <p id="cards-count" class="muted"></p>
      <div id="cards-list" class="cards-list"></div>
    </section>

    <!-- 통계 -->
    <section id="screen-stats" class="screen" hidden>
      <h2>학습 통계</h2>
      <div class="stat-grid">
        <div class="stat-box"><span class="stat-num" id="stat-reviewed">0</span><span class="stat-label">오늘 복습</span></div>
        <div class="stat-box"><span class="stat-num" id="stat-streak">0</span><span class="stat-label">연속 학습일</span></div>
        <div class="stat-box"><span class="stat-num" id="stat-known">0</span><span class="stat-label">아는 단어</span></div>
        <div class="stat-box"><span class="stat-num" id="stat-total">0</span><span class="stat-label">전체 단어</span></div>
      </div>
      <button type="button" id="copy-words" class="btn" disabled>오늘 복습한 단어 복사</button>
    </section>

    <!-- 설정 -->
    <section id="screen-settings" class="screen" hidden>
      <h2>설정</h2>
      <label class="field">
        <span>하루 새 카드 수</span>
        <input type="number" id="set-newPerDay" min="0" max="999" />
      </label>
      <label class="field">
        <span>알림 시각</span>
        <input type="time" id="set-notifyTime" />
      </label>
      <button type="button" id="btn-save-settings" class="btn primary">저장</button>
      <p class="muted small">알림은 기기 지원 시에만 예약됩니다. 미지원이면 앱을 열 때 밀린 개수를 배지/배너로 알려줍니다.</p>
    </section>
  </main>

  <nav class="app-nav">
    <button type="button" data-nav="review" class="nav-btn active">복습</button>
    <button type="button" data-nav="cards" class="nav-btn">카드</button>
    <button type="button" data-nav="stats" class="nav-btn">통계</button>
    <button type="button" data-nav="settings" class="nav-btn">설정</button>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
